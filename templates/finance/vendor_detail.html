{% extends "base.html" %}
{% block title %}Vendor{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-4">{{ vendor.name }}</h1>

<div class="mb-6">
  <p><b>Phone:</b> {{ vendor.phone }}</p>
  <p><b>Email:</b> {{ vendor.email }}</p>
</div>

<h2 class="font-semibold mb-2">Recent Expenses</h2>

<ul class="bg-white shadow rounded p-4">
  {% for e in recent_expenses %}
    <li class="border-b py-2">
      {{ e.title }} — {{ e.total_amount }}
    </li>
  {% endfor %}
</ul>

</div>
{% endblock %}
