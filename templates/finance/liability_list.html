{% extends "base.html" %}
{% block title %}Liabilities{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-4">Liabilities</h1>

<table class="w-full bg-white shadow rounded">
<thead class="bg-gray-100">
<tr>
<th>Name</th>
<th>Amount</th>
<th>Status</th>
<th>Due Date</th>
</tr>
</thead>

<tbody>
{% for l in liabilities %}
<tr class="border-t">
<td class="p-3">
<a href="{% url 'finance:liability_detail' l.pk %}" class="text-blue-600">
{{ l.name }}
</a>
</td>
<td>{{ l.balance }}</td>
<td>{{ l.status }}</td>
<td>{{ l.due_date }}</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>
{% endblock %}
