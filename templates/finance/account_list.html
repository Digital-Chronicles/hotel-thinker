{% extends "base.html" %}
{% block title %}Accounts{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto p-6">

  <h1 class="text-2xl font-bold mb-4">Chart of Accounts</h1>

  <form method="get" class="mb-4 flex gap-2">
    <input type="text" name="q" placeholder="Search accounts..."
           class="border px-3 py-2 rounded w-1/3">
    <button class="bg-blue-600 text-white px-4 py-2 rounded">Search</button>
  </form>

  <div class="bg-white shadow rounded">
    <table class="w-full text-sm">
      <thead class="bg-gray-100">
        <tr>
          <th class="p-3 text-left">Code</th>
          <th class="p-3 text-left">Name</th>
          <th class="p-3 text-left">Type</th>
          <th class="p-3 text-left">Balance</th>
        </tr>
      </thead>
      <tbody>
        {% for acc in accounts %}
        <tr class="border-t hover:bg-gray-50">
          <td class="p-3">{{ acc.account_code }}</td>
          <td class="p-3">
            <a href="{% url 'finance:account_detail' acc.pk %}" class="text-blue-600">
              {{ acc.name }}
            </a>
          </td>
          <td class="p-3">{{ acc.account_type }}</td>
          <td class="p-3 font-semibold">{{ acc.balance }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>
{% endblock %}
