{% load humanize %}
<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead class="bg-slate-50 text-slate-600">
      <tr>
        <th class="text-left p-3">Item</th>
        <th class="text-right p-3">Qty</th>
        <th class="text-right p-3">Unit</th>
        <th class="text-right p-3">Total</th>
        <th class="text-right p-3">Action</th>
      </tr>
    </thead>
    <tbody>
      {% for it in items %}
      <tr class="border-t">
        <td class="p-3">
          <div class="font-semibold text-slate-900">{{ it.item.name }}</div>
          {% if it.note %}<div class="text-xs text-slate-500 mt-0.5">{{ it.note }}</div>{% endif %}
        </td>
        <td class="p-3 text-right">{{ it.qty }}</td>
        <td class="p-3 text-right">UGX {{ it.unit_price|intcomma }}</td>
        <td class="p-3 text-right font-semibold">UGX {{ it.line_total|intcomma }}</td>
        <td class="p-3 text-right">
          <form method="post" action="{% url 'restaurant:order_remove_item' order.pk it.pk %}"
                onsubmit="return confirm('Remove this item?')" class="inline">
            {% csrf_token %}
            <button class="px-3 py-2 rounded-lg border border-slate-300 bg-white text-xs font-semibold text-slate-700 hover:bg-slate-50"
                    {% if order.status == 'paid' or order.status == 'cancelled' %}disabled style="opacity:.6"{% endif %}>
              Remove
            </button>
          </form>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="5" class="p-6 text-center text-slate-500">No items yet. Add items above.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
